# NetzSicht — Amazon Marketing Agency
# paperclip.ing Agent-Konfigurationen
#
# 10 Agents, 5 Teams. Task-Koordination laeuft ueber
# paperclip.ing's native Issues API (nicht ClickUp).
# ClickUp Manager spiegelt nur Status fuer Kunden-Sichtbarkeit.

# =============================================================================
# CEO — Orchestriert alle Pipelines
# =============================================================================

ceo:
  name: CEO
  title: CEO

  model: claude-opus-4-6

  heartbeat:
    interval: "2 minutes"
    cooldown: "30 seconds"
    max_concurrent_runs: 1
    wake_triggers:
      - mention
      - new_task
      - child_update

  budget:
    monthly_tokens: 5000000
    warning_threshold: 80

