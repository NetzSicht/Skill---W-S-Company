# =============================================================================
# TASK FLOW
# =============================================================================
#
# Alle Agents nutzen paperclip.ing's native Issues API:
#
# 1. CEO empfaengt Client-Brief (Issue an CEO assigned)
# 2. CEO erstellt Child-Issues und assigned an Agents
#    -> Assigning triggert Agent-Heartbeat automatisch
# 3. Agent checkt Issue aus: POST /api/issues/{id}/checkout
# 4. Agent arbeitet, schreibt Output in ./workspace/{task-id}/
# 5. Agent markiert Issue als done: PATCH /api/issues/{id}
# 6. CEO sieht Completion, erstellt naechste Phase-Issues
#
# Feedback-Loop:
# - Quality-Reviewer: REVISION_NOETIG -> erstellt Subtask fuer Listing-Briefer
# - Quality-Reviewer: ABGELEHNT -> erstellt Subtask fuer Produkt-Analyst
#
# ClickUp-Manager spiegelt Status nach ClickUp fuer Kunden-Sichtbarkeit.
